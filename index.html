<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Minha Vida Financeira</title>
<style>
:root{--bg:#f4f7fb;--panel:#fff;--ink:#172033;--muted:#68758b;--line:#e4e9f1;--brand:#155eef;--green:#16875f;--red:#d64553}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink)}button,input,select{font:inherit}.hidden{display:none!important}.auth{min-height:100vh;display:grid;place-items:center;padding:20px;background:linear-gradient(135deg,#0e326f,#155eef)}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:20px}.authCard{width:min(430px,100%);box-shadow:0 30px 80px rgba(0,0,0,.25)}h1,h2,p{margin-top:0}.muted{color:var(--muted);font-size:13px}.form{display:grid;gap:13px}.form label{font-size:12px;font-weight:800}.form input,.form select{width:100%;margin-top:6px;padding:11px;border:1px solid var(--line);border-radius:10px}.btn{border:1px solid var(--line);background:#fff;padding:10px 13px;border-radius:10px;font-weight:800;cursor:pointer}.btn.primary{background:var(--brand);border-color:var(--brand);color:white}.link{border:0;background:none;color:var(--brand);font-weight:800;cursor:pointer}.app{min-height:100vh;display:grid;grid-template-columns:230px 1fr}.side{background:#10213d;color:white;padding:18px}.side button{width:100%;margin-bottom:8px;text-align:left;border:0;background:transparent;color:#c4d0e2;padding:11px;border-radius:10px}.side button.active,.side button:hover{background:#1b3155;color:#fff}.main{padding:24px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}.actions{display:flex;gap:8px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.value{font-size:25px;font-weight:900;margin-top:6px}.green{color:var(--green)}.red{color:var(--red)}.tableWrap{overflow:auto;margin-top:14px}table{width:100%;border-collapse:collapse;min-width:700px}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:12px}.modalBack{position:fixed;inset:0;background:rgba(5,15,30,.65);display:none;align-items:center;justify-content:center;padding:16px}.modalBack.show{display:flex}.modal{width:min(560px,100%);background:#fff;border-radius:18px;padding:20px}.toast{position:fixed;right:20px;top:20px;background:#10213d;color:white;padding:12px 15px;border-radius:10px;display:none}.toast.show{display:block}@media(max-width:760px){.app{grid-template-columns:1fr}.side{display:none}.main{padding:16px}.metrics{grid-template-columns:1fr}.top{align-items:flex-start}.actions{flex-wrap:wrap}}
</style>
</head>
<body>
<section id="authScreen" class="auth">
  <div class="card authCard">
    <h1>Minha Vida Financeira</h1>
    <p class="muted">Acesso local neste navegador.</p>
    <form id="loginForm" class="form">
      <label>E-mail<input id="loginEmail" type="email" required></label>
      <label>Senha<input id="loginPassword" type="password" minlength="4" required></label>
      <button id="loginButton" type="submit" class="btn primary">Entrar</button>
      <button id="showRegister" type="button" class="link">Criar conta local</button>
    </form>
    <form id="registerForm" class="form hidden">
      <label>Nome<input id="registerName" required></label>
      <label>E-mail<input id="registerEmail" type="email" required></label>
      <label>Senha<input id="registerPassword" type="password" minlength="4" required></label>
      <label>Confirmar senha<input id="registerPassword2" type="password" minlength="4" required></label>
      <button type="submit" class="btn primary">Criar conta</button>
      <button id="showLogin" type="button" class="link">Voltar ao login</button>
    </form>
    <p id="authMessage" class="muted"></p>
  </div>
</section>

<section id="appScreen" class="hidden">
  <div class="app">
    <aside class="side">
      <h2>Minha Vida Financeira</h2>
      <button class="active" data-page="dashboard">Visão geral</button>
      <button data-page="transactions">Movimentações</button>
      <button id="logoutButton">Sair</button>
    </aside>
    <main class="main">
      <header class="top">
        <div><h1 id="pageTitle">Visão geral</h1><p id="welcome" class="muted"></p></div>
        <div class="actions"><button id="addButton" class="btn primary">Adicionar</button></div>
      </header>
      <section id="page-dashboard">
        <div class="metrics">
          <div class="card"><div class="muted">Saldo</div><div id="balance" class="value">R$ 0,00</div></div>
          <div class="card"><div class="muted">Receitas</div><div id="income" class="value green">R$ 0,00</div></div>
          <div class="card"><div class="muted">Despesas</div><div id="expense" class="value red">R$ 0,00</div></div>
        </div>
      </section>
      <section id="page-transactions" class="hidden">
        <div class="card">
          <h2>Movimentações</h2>
          <div id="emptyState" class="muted">Nenhuma movimentação cadastrada.</div>
          <div id="tableWrap" class="tableWrap hidden"><table><thead><tr><th>Data</th><th>Descrição</th><th>Tipo</th><th>Valor</th><th>Ação</th></tr></thead><tbody id="transactionsBody"></tbody></table></div>
        </div>
      </section>
    </main>
  </div>
</section>

<div id="transactionModal" class="modalBack">
  <div class="modal">
    <h2>Novo lançamento</h2>
    <form id="transactionForm" class="form">
      <label>Tipo<select id="transactionType"><option value="expense">Despesa</option><option value="income">Receita</option></select></label>
      <label>Data<input id="transactionDate" type="date" required></label>
      <label>Descrição<input id="transactionDescription" required></label>
      <label>Valor<input id="transactionAmount" type="number" min="0.01" step="0.01" required></label>
      <div class="actions"><button type="button" id="cancelTransaction" class="btn">Cancelar</button><button type="submit" class="btn primary">Salvar</button></div>
    </form>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
(function(){
'use strict';
const KEY='mvf_fixed_v1';
const $=id=>document.getElementById(id);
const brl=value=>Number(value||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
let db={users:[],session:null,transactions:[]};
try{const saved=JSON.parse(localStorage.getItem(KEY)||'null');if(saved&&typeof saved==='object')db=Object.assign(db,saved)}catch(e){}
function save(){localStorage.setItem(KEY,JSON.stringify(db));}
function message(text){$('authMessage').textContent=text;}
function toast(text){$('toast').textContent=text;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2000);}
function currentUser(){return db.users.find(u=>u.id===db.session)||null;}
function showAuth(){$('authScreen').classList.remove('hidden');$('appScreen').classList.add('hidden');}
function showApp(){const user=currentUser();if(!user){showAuth();return;}$('authScreen').classList.add('hidden');$('appScreen').classList.remove('hidden');$('welcome').textContent='Olá, '+user.name+'.';render();}
function render(){let inc=0,out=0;db.transactions.forEach(t=>{if(t.type==='income')inc+=t.amount;else out+=t.amount;});$('income').textContent=brl(inc);$('expense').textContent=brl(out);$('balance').textContent=brl(inc-out);$('emptyState').classList.toggle('hidden',db.transactions.length>0);$('tableWrap').classList.toggle('hidden',db.transactions.length===0);$('transactionsBody').innerHTML=db.transactions.slice().reverse().map(t=>'<tr><td>'+t.date.split('-').reverse().join('/')+'</td><td>'+escapeHtml(t.description)+'</td><td>'+(t.type==='income'?'Receita':'Despesa')+'</td><td>'+brl(t.amount)+'</td><td><button class="link" data-delete="'+t.id+'">Excluir</button></td></tr>').join('');document.querySelectorAll('[data-delete]').forEach(b=>b.addEventListener('click',()=>{db.transactions=db.transactions.filter(t=>t.id!==b.dataset.delete);save();render();}));}
function escapeHtml(text){return String(text).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
$('showRegister').addEventListener('click',()=>{$('loginForm').classList.add('hidden');$('registerForm').classList.remove('hidden');message('');});
$('showLogin').addEventListener('click',()=>{$('registerForm').classList.add('hidden');$('loginForm').classList.remove('hidden');message('');});
$('registerForm').addEventListener('submit',e=>{e.preventDefault();const name=$('registerName').value.trim();const email=$('registerEmail').value.trim().toLowerCase();const pass=$('registerPassword').value;const pass2=$('registerPassword2').value;if(pass!==pass2){message('As senhas não coincidem.');return;}if(db.users.some(u=>u.email===email)){message('Este e-mail já está cadastrado.');return;}const user={id:String(Date.now()),name,email,pass};db.users.push(user);db.session=user.id;save();showApp();});
$('loginForm').addEventListener('submit',e=>{e.preventDefault();const email=$('loginEmail').value.trim().toLowerCase();const pass=$('loginPassword').value;const user=db.users.find(u=>u.email===email&&u.pass===pass);if(!user){message('E-mail ou senha inválidos. Crie uma conta local primeiro.');return;}db.session=user.id;save();showApp();});
$('logoutButton').addEventListener('click',()=>{db.session=null;save();showAuth();});
document.querySelectorAll('[data-page]').forEach(button=>button.addEventListener('click',()=>{document.querySelectorAll('[data-page]').forEach(x=>x.classList.remove('active'));button.classList.add('active');const page=button.dataset.page;$('page-dashboard').classList.toggle('hidden',page!=='dashboard');$('page-transactions').classList.toggle('hidden',page!=='transactions');$('pageTitle').textContent=page==='dashboard'?'Visão geral':'Movimentações';}));
$('addButton').addEventListener('click',()=>{$('transactionDate').value=new Date().toISOString().slice(0,10);$('transactionModal').classList.add('show');});
$('cancelTransaction').addEventListener('click',()=>$('transactionModal').classList.remove('show'));
$('transactionForm').addEventListener('submit',e=>{e.preventDefault();const amount=Number($('transactionAmount').value);if(amount<=0){toast('Informe um valor válido.');return;}db.transactions.push({id:String(Date.now()),type:$('transactionType').value,date:$('transactionDate').value,description:$('transactionDescription').value.trim(),amount});save();e.target.reset();$('transactionModal').classList.remove('show');render();toast('Lançamento salvo.');});
if(currentUser())showApp();else showAuth();
})();
</script>
</body>
</html>
