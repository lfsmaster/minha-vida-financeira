<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#6c4cff">
<title>Minha Vida Financeira — Creative Finance OS</title>
<link rel="stylesheet" href="clock.css?v=10">
<link rel="stylesheet" href="creative-design.css?v=10">
<style>
.python-boot{position:fixed;inset:0;z-index:9999;display:grid;place-items:center;padding:22px;background:radial-gradient(circle at 18% 18%,rgba(255,255,255,.16),transparent 25%),linear-gradient(135deg,#17112f,#6042ec 55%,#ff6875 120%);color:#fff}.python-boot-card{width:min(500px,100%);padding:30px;border-radius:30px;background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.24);backdrop-filter:blur(20px);box-shadow:0 30px 90px rgba(0,0,0,.35);text-align:center}.python-boot-mark{width:66px;height:66px;margin:0 auto 18px;border-radius:21px;background:linear-gradient(135deg,#7256ff,#22c5d5);display:grid;place-items:center;font-weight:950;font-size:26px;box-shadow:0 14px 35px rgba(41,24,120,.32)}.python-boot h2{margin:0 0 8px}.python-boot p{margin:0;color:#ebe7ff;line-height:1.5}.python-spinner{width:40px;height:40px;margin:21px auto 0;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:pythonSpin .8s linear infinite}.python-boot[data-state=error] .python-spinner{display:none}.python-retry{margin-top:18px;padding:11px 17px;border:0;border-radius:12px;background:#fff;color:#3f2aa8;font-weight:850;cursor:pointer}@keyframes pythonSpin{to{transform:rotate(360deg)}}#calculationEngineStatus[data-state=ok]{color:#9ef2d7}#calculationEngineStatus[data-state=error]{color:#ff9b9b}
</style>
</head>
<body>
<div id="pythonBoot" class="python-boot" data-state="loading">
  <div class="python-boot-card">
    <div class="python-boot-mark">Py</div>
    <h2 id="pythonBootTitle">Inicializando o motor Python</h2>
    <p id="pythonBootDetail">Preparando o Creative Finance OS…</p>
    <div class="python-spinner"></div>
    <button id="pythonBootRetry" class="python-retry" type="button" hidden onclick="location.reload()">Tentar novamente</button>
  </div>
</div>
<section id="authScreen" class="auth">
  <div class="auth-card">
    <div class="auth-brand"><div class="logo">MV</div><div><h1 style="margin:0">Minha Vida Financeira</h1><small>Creative Finance OS · gestão integrada</small></div></div>
    <form id="loginForm" class="form">
      <label class="field">E-mail<input id="loginEmail" type="email" autocomplete="email" required></label>
      <label class="field">Senha<input id="loginPassword" type="password" autocomplete="current-password" minlength="4" required></label>
      <button class="btn primary" type="submit">Entrar</button>
      <button type="button" class="link" id="showRegister">Criar conta local</button>
    </form>
    <form id="registerForm" class="form hidden">
      <label class="field">Nome<input id="registerName" autocomplete="name" required></label>
      <label class="field">E-mail<input id="registerEmail" type="email" autocomplete="email" required></label>
      <label class="field">Senha<input id="registerPassword" type="password" autocomplete="new-password" minlength="4" required></label>
      <label class="field">Confirmar senha<input id="registerPassword2" type="password" autocomplete="new-password" minlength="4" required></label>
      <button class="btn primary" type="submit">Criar conta e entrar</button>
      <button type="button" class="link" id="showLogin">Voltar para o login</button>
    </form>
    <p id="authMessage" class="muted small" style="margin:12px 0 0"></p>
  </div>
</section>
<section id="appScreen" class="hidden">
  <div class="app">
    <aside class="sidebar">
      <div class="side-brand"><div class="logo">MV</div><div><strong id="systemName">Minha Vida Financeira</strong><small><span class="sync-badge"><i class="sync-dot"></i><span id="calculationEngineStatus">motor Python carregando</span></span></small></div></div>
      <nav id="nav" class="nav"></nav>
    </aside>
    <main class="main">
      <header class="topbar">
        <div><h1 id="pageTitle">Visão geral</h1><p id="userGreeting" class="muted" style="margin:0"></p></div>
        <div class="top-actions"><input id="monthFilter" class="month" type="month"><button class="btn primary" data-action="add-expense">Adicionar</button></div>
      </header>
      <section id="pageRoot" class="page active"></section>
    </main>
  </div>
  <nav class="mobile-nav"><button data-page="dashboard">Início</button><button data-page="transactions">Movimentos</button><button class="add" data-action="add-expense">＋</button><button data-page="budget">Planejar</button><button data-page="settings">Perfil</button></nav>
</section>
<div id="modalBack" class="modal-back"><div class="modal"><h2 id="modalTitle"></h2><form id="modalForm" class="form two"></form><div class="actions" style="margin-top:16px"><button id="modalCancel" class="btn" type="button">Cancelar</button><button class="btn primary" type="submit" form="modalForm">Salvar</button></div></div></div>
<input id="restoreFile" type="file" accept="application/json" hidden>
<div id="toast" class="toast"></div>
<script src="clock-core.js?v=10"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v314.0.2/full/pyodide.js"></script>
<script src="python-calculations.js?v=10"></script>
</body>
</html>
