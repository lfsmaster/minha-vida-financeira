<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Minha Vida Financeira</title>
<style>
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Inter,system-ui,sans-serif;background:#f4f7fb}.bar{height:64px;background:#10213d;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px 18px;gap:12px;box-shadow:0 3px 14px rgba(0,0,0,.18)}.brand{font-weight:900}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid rgba(255,255,255,.22);background:#fff;color:#172033;padding:10px 14px;border-radius:10px;font-weight:800;text-decoration:none;cursor:pointer}.btn.primary{background:#155eef;border-color:#155eef;color:#fff}.frame{width:100%;height:calc(100% - 64px);border:0;display:block}@media(max-width:620px){.bar{height:auto;min-height:72px;align-items:flex-start}.brand{padding-top:10px}.actions{justify-content:flex-end}.btn{padding:9px 10px;font-size:12px}.frame{height:calc(100% - 82px)}}
</style>
</head>
<body>
<header class="bar">
<div class="brand">Minha Vida Financeira</div>
<div class="actions">
<a class="btn primary" href="importar.html">⬆ Importar CSV/OFX</a>
<a class="btn" href="index.html" target="appFrame">Atualizar sistema</a>
</div>
</header>
<iframe class="frame" name="appFrame" src="index.html" title="Sistema Minha Vida Financeira"></iframe>
</body>
</html>
